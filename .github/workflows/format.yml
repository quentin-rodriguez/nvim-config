name: Format

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  stylua:
    name: Formatting check with stylua
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: 2.3.1
          args: --check

